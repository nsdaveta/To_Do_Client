<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-192.png" />
    <link rel="apple-touch-icon" href="/logo-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="To Do App" />
    <link rel="manifest" href="/manifest.json" />
    <title>To Do App - Organizer</title>
  </head>     
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service worker and environment constants
      const isTauri = typeof window !== 'undefined' && (window.__TAURI_INTERNALS__ !== undefined || window.__TAURI__ !== undefined || window.__TAURI_IPC__ !== undefined);
      const isFileProtocol = window.location.protocol === 'file:';

      // 1. Service Worker Management
      if ('serviceWorker' in navigator) {
        if (isTauri) {
          // Unregister any active service worker in Tauri environment for better performance
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let reg of registrations) reg.unregister();
          });
        } else if (!isFileProtocol) {
          // Register Service Worker for PWA functionality on Web
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('SW registered'))
              .catch(err => console.log('SW registration failed:', err));
          });
        }
      }

      // 2. Robust Offline Detection
      if (!isFileProtocol) {
        window.addEventListener('offline', () => {
          // Wait 1500ms to confirm the offline state is persistent and not a flicker
          setTimeout(async () => {
            if (navigator.onLine === false) {
              try {
                // Persistent check: try to fetch a known asset with cache busting
                await fetch('/logo-192.png?t=' + Date.now(), { 
                  method: 'HEAD', 
                  mode: 'no-cors', 
                  cache: 'no-store' 
                });
                console.log('Connectivity flicker detected but restored. Staying online.');
              } catch (e) {
                // Confirmed truly offline
                console.log('Confirmed offline state. Redirecting.');
                window.location.href = 'offline.html';
              }
            }
          }, 1500);
        });
      }
    </script>
  </body>
</html>
