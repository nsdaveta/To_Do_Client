<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-192.png" />
    <link rel="apple-touch-icon" href="/logo-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="To Do App" />
    <link rel="manifest" href="/manifest.json" />
    <title>To Do App - Organizer</title>
  </head>     
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service worker registration - only for web environments
      // Tauri injects __TAURI_INTERNALS__ or __TAURI__ into the window
      const isTauri = typeof window !== 'undefined' && (window.__TAURI_INTERNALS__ !== undefined || window.__TAURI__ !== undefined || window.__TAURI_IPC__ !== undefined);
      
      if ('serviceWorker' in navigator) {
        if (isTauri) {
          // Unregister any active service worker in Tauri
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
              console.log('SW unregistered in Tauri environment');
            }
          });
        } else if (window.location.protocol !== 'file:') {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(registration => {
              console.log('SW registered: ', registration);
            }).catch(error => {
              console.log('SW registration failed: ', error);
            });
          });
        }
      }

      window.addEventListener('offline', () => {
        // Wait 500ms to ensure the offline state is persistent and not a flicker
        setTimeout(() => {
          if (navigator.onLine === false) {
            window.location.href = '/offline.html';
          }
        }, 500);
      });
    </script>
  </body>
</html>
