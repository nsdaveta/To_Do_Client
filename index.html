<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-192.png" />
    <link rel="apple-touch-icon" href="/logo-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="To Do App" />
    <link rel="manifest" href="/manifest.json" />
    <title>To Do App - Organizer</title>
  </head>     
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/connectivity.js"></script>
    <script>
      // Service worker and environment constants
      const isTauri = typeof window !== 'undefined' && (window.__TAURI_INTERNALS__ !== undefined || window.__TAURI__ !== undefined || window.__TAURI__ !== undefined);
      const isFileProtocol = window.location.protocol === 'file:';

      // 1. Service Worker Management
      if ('serviceWorker' in navigator) {
        if (isTauri) {
          // Unregister any active service worker in Tauri environment 
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let reg of registrations) reg.unregister();
          });
        } else if (!isFileProtocol) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('SW registered'))
              .catch(err => console.log('SW registration failed:', err));
          });
        }
      }

      // 2. Initialize Robust Offline Detection
      if (typeof initConnectivityTracker === 'function') {
        initConnectivityTracker('https://to-do-server-1yuc.onrender.com/todos');
      }
    </script>
  </body>
</html>
