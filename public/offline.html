<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - To Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a !important; /* Force Midnight Blue */
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.4);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(236, 72, 153, 0.3);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(139, 92, 246, 0.3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3.5rem 2rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating Icon */
        .icon-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: bob 3s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
            position: relative;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .main-icon {
            width: 52px;
            height: 52px;
            stroke: #f8fafc;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
        }

        /* Typography */
        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        p span {
            color: #f8fafc;
            font-weight: 400;
        }

        /* Button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 0.875rem 2.5rem;
            border-radius: 9999px;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.8);
            gap: 10px;
            outline: none;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.9);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(1px);
        }
        
        .refresh-icon {
            width: 20px;
            height: 20px;
            transition: transform 0.5s ease;
            stroke: white;
            filter: none;
        }

        .btn:hover .refresh-icon {
            transform: rotate(180deg);
        }

        @keyframes infiniteSpin {
            100% { transform: rotate(360deg); }
        }

        /* Glitch effect on cross line of wifi */
        .wifi-cross {
            stroke: #ef4444;
            stroke-width: 2.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.6));
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <div class="icon-container">
            <svg class="main-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
                <line x1="2" y1="2" x2="22" y2="22" class="wifi-cross"></line>
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection.<br/><span>Please check your network and try again.</span></p>
        <button onclick="retryConnection(event)" class="btn">
            <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            Try Again
        </button>
    </div>

    <script>
        // Shared robust connectivity check logic
        async function checkActualConnectivity() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                
                await fetch('https://to-do-server-1yuc.onrender.com/todos', { 
                    method: 'HEAD', 
                    mode: 'no-cors', 
                    cache: 'no-store',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                return true;
            } catch (e) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000);
                    await fetch('https://www.google.com/favicon.ico', { 
                        method: 'HEAD', 
                        mode: 'no-cors', 
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    return true;
                } catch (e2) {
                    return false;
                }
            }
        }

        async function retryConnection(e) {
            e.preventDefault();
            const btn = e.currentTarget;
            const icon = btn.querySelector('.refresh-icon');
            
            if (btn.disabled) return;
            btn.disabled = true;
            
            const originalHTML = btn.innerHTML;
            icon.style.transition = 'none';
            icon.style.animation = 'infiniteSpin 1s linear infinite';
            btn.innerHTML = icon.outerHTML + " Checking Connection...";
            
            const isOnline = await checkActualConnectivity();
            
            if (isOnline) {
                // If we reach this point, we are actually online
                window.location.href = '/';
            } else {
                // Still truly offline
                setTimeout(() => {
                    btn.disabled = false;
                    icon.style.animation = '';
                    btn.innerHTML = originalHTML;
                    
                    // Add a quick shake effect to indicate failure
                    btn.style.transform = 'translateX(5px)';
                    setTimeout(() => btn.style.transform = 'translateX(-5px)', 100);
                    setTimeout(() => btn.style.transform = 'translateX(5px)', 200);
                    setTimeout(() => btn.style.transform = 'translateX(0)', 300);
                }, 500);
            }
        }
        
        // Listen for connection restoration automatically
        window.addEventListener('online', async () => {
             const isOnline = await checkActualConnectivity();
             if (isOnline) window.location.href = '/';
        });
        
        // Periodically check in background
        setInterval(async () => {
            if (navigator.onLine) {
                const isOnline = await checkActualConnectivity();
                if (isOnline) window.location.href = '/';
            }
        }, 5000);
    </script>
</body>
</html>
